<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>(function(){var t='dark';try{t=localStorage.getItem('theme')||'dark'}catch(e){}document.documentElement.setAttribute('data-theme',t)})()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <link rel="icon" href="../assets/images/logo.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="../assets/images/1.webp" as="image" fetchpriority="high">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,300;8..144,25..151,500;8..144,25..151,700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" media="print">

  <!-- Deferred stylesheets -->
  <link rel="stylesheet" href="../css/base/variables.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../css/base/reset.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../css/layout/grid.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../css/components/mobile-menu.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../css/tailwind.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../css/components/blog.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" media="print" onload="this.media='all'">

  <!-- Critical CSS inlined -->
  <style>
    :root{--surface:#0f1111;--surface-variant:#171a1a;--on-surface:#e5e7eb;--on-surface-muted:#9ca3af;--primary:#94bbf7;--secondary:#a3c978;--outline:rgba(255,255,255,0.08);--outline-hover:rgba(255,255,255,0.16);--transition-speed:0.3s;--font-sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font-display:'Caffeine Overdrive','Roboto Flex',sans-serif;--header-height:70px}[data-theme="light"]{--surface:#fafafa;--surface-variant:#f1f3f5;--on-surface:#1a1c1e;--on-surface-muted:#64748b;--primary:#1e5088;--secondary:#3b5a1c;--outline:rgba(0,0,0,0.08);--outline-hover:rgba(0,0,0,0.16)}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;transition:background-color var(--transition-speed) ease,border-color var(--transition-speed) ease,color var(--transition-speed) ease}html{scroll-behavior:smooth;scroll-padding-top:var(--header-height)}body{background-color:var(--surface);color:var(--on-surface);font-family:var(--font-sans);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}h1,h2,h3,h4{font-family:var(--font-display);text-transform:uppercase;letter-spacing:-0.02em;line-height:1.1}a{color:var(--primary);text-decoration:none;transition:opacity var(--transition-speed)}a:hover{opacity:0.8}img{max-width:100%;height:auto;display:block}.container{max-width:1200px;margin:0 auto;padding:0 24px}

    nav{position:sticky;top:0;background:rgba(15,17,17,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid var(--outline)}[data-theme="light"] nav{background:rgba(250,250,250,0.8)}.nav-container{display:flex;justify-content:space-between;align-items:center;height:var(--header-height)}.nav-logo{font-family:var(--font-display);font-weight:700;font-size:1.1rem;letter-spacing:0.1em;white-space:nowrap;flex-shrink:0;color:var(--on-surface)}.nav-logo:hover{opacity:0.8}.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}.theme-toggle{padding:6px 14px;cursor:pointer;background:transparent;border:1px solid var(--outline);border-radius:4px;font-family:var(--font-sans);font-size:0.75rem;font-weight:600;letter-spacing:0.05em;color:var(--on-surface);text-transform:uppercase;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center}.theme-toggle:hover{background:var(--surface-variant);border-color:var(--outline-hover)}.nav-btn{background:transparent;border:1px solid var(--outline);color:var(--on-surface-muted);padding:6px 14px;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;border-radius:4px;cursor:pointer;text-decoration:none;display:flex;align-items:center;min-height:48px;gap:4px}.nav-btn:hover{background:var(--surface-variant);border-color:var(--outline-hover);color:var(--on-surface)}

    footer{padding:48px 0;border-top:1px solid var(--outline);text-align:center;color:var(--on-surface-muted);font-size:0.75rem;letter-spacing:0.1em}.footer-name{font-family:var(--font-display);font-weight:700;font-size:0.9rem;color:var(--on-surface);margin-bottom:4px}.footer-tagline{font-size:0.7rem;margin-bottom:16px}.footer-links{display:flex;justify-content:center;gap:24px}.footer-link{color:var(--on-surface-muted);font-size:0.75rem;font-weight:600}.footer-link:hover{color:var(--on-surface)}

    @media(max-width:768px){.container{padding:0 24px}}
  </style>
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="../index.html" class="nav-logo" id="brandName"></a>
      <div class="nav-right">
        <a href="../index.html" class="nav-btn">Home</a>
        <button data-toggle-theme class="theme-toggle" aria-label="Toggle theme"><svg class="theme-icon theme-icon-dark" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg><svg class="theme-icon theme-icon-light" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M440-760v-160h80v160h-80Zm266 110-55-55 112-115 56 57-113 113Zm54 210v-80h160v80H760ZM440-40v-160h80v160h-80ZM254-652 140-763l57-56 113 113-56 54Zm508 512L651-255l54-54 114 110-57 59ZM40-440v-80h160v80H40Zm157 300-56-57 112-112 29 27 29 28-114 114Zm113-170q-70-70-70-170t70-170q70-70 170-70t170 70q70 70 70 170t-70 170q-70 70-170 70t-170-70Zm283-57q47-47 47-113t-47-113q-47-47-113-47t-113 47q-47 47-47 113t47 113q47 47 113 47t113-47ZM480-480Z"/></svg></button>
      </div>
    </div>
  </nav>

  <main class="container" id="app"></main>

  <footer>
    <div class="container">
      <div class="footer-name"></div>
      <div class="footer-tagline"></div>
      <div class="footer-links"></div>
    </div>
  </footer>

  <script>var IMG_PREFIX = '../';</script>
  <script defer src="../js/utils/helpers.js"></script>
  <script defer src="../js/utils/blog-renderer.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadTheme();
      document.querySelector('[data-toggle-theme]').addEventListener('click', toggleTheme);
      var params = (new URL(document.location)).searchParams;
      if (params.get('post')) {
        var nav = document.querySelector('nav');
        if (nav) nav.style.display = 'none';
        var footer = document.querySelector('footer');
        if (footer) footer.style.display = 'none';
        document.getElementById('app').classList.remove('container');
      } else {
        var titleEl = document.getElementById('brandName');
        var fName = document.querySelector('.footer-name');
        var fTag = document.querySelector('.footer-tagline');
        var fLinks = document.querySelector('.footer-links');
        fetch('../data/site.json').then(function(r) { return r.json(); }).then(function(d) {
          if (d.name) titleEl.textContent = d.name;
          if (d.footer) {
            if (fName) fName.textContent = d.footer.name || '';
            if (fTag) fTag.textContent = d.footer.tagline || '';
            if (fLinks && d.footer.links) {
              fLinks.innerHTML = d.footer.links.map(function(l) { return '<a href="' + (l.url || '#') + '" class="footer-link">' + l.label + '</a>'; }).join('');
            }
          }
        }).catch(function() {});
        fetch('../blog/blog.json?t=' + Date.now()).then(function(r) { return r.json(); }).then(function(b) {
          if (b.data && b.data.heading) {
            document.title = b.data.heading;
            var meta = document.querySelector('meta[name="description"]');
            if (meta) meta.content = b.data.heading;
          }
        }).catch(function() {});
      }
      if (typeof initBlog === 'function') {
        initBlog('app', '../blog/posts.json');
      }
      document.getElementById('app').addEventListener('click', function(e) {
        if (e.target.closest('.post-theme-toggle')) { e.preventDefault(); toggleTheme(); }
      });
    });
  </script>
</body>
</html>
